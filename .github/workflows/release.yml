name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write      # required: gh release create/upload needs releases:write

# Workflow-level env. Flip SKIP_NOTARIZE back to 'false' (or remove it)
# once Apple has configured the team for notarization (pending support ticket).
env:
  SKIP_NOTARIZE: 'true'
  VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
  VITE_CDN_DOMAIN: ${{ secrets.VITE_CDN_DOMAIN }}
  VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
  VITE_DISCORD_CLIENT_ID: ${{ secrets.VITE_DISCORD_CLIENT_ID }}
  VITE_PLAYER_SECRET: ${{ secrets.VITE_PLAYER_SECRET }}

jobs:
  # Stage 1: idempotently create the draft release so both matrix legs can
  # upload into the same one without a race. Replaces publisher-github which
  # had a race condition between parallel matrix legs ("Not Found" 404s).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — assets will be appended."
          else
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --generate-notes \
              --repo "${{ github.repository }}"
          fi

  # Stage 2: matrix build + upload. Each leg produces its platform's
  # artifacts locally (electron-forge make) then uploads them to the
  # pre-created draft release (gh release upload). No publisher-github.
  build:
    needs: create-release
    strategy:
      fail-fast: false       # one platform failing shouldn't kill the other
      matrix:
        include:
          - os: macos-14
            platform: darwin
          - os: windows-latest
            platform: win32
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Verify tag matches package.json version        # D-24
        shell: bash
        run: node scripts/verify-tag.mjs

      - name: Install dependencies
        run: npm ci

      # -------- macOS-only: cert import (signing still happens) --------
      - name: Import Developer ID certificate
        if: matrix.os == 'macos-14'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}

      - name: Verify signing identity is available
        if: matrix.os == 'macos-14'
        run: security find-identity -v -p codesigning

      # -------- macOS-only: ASC API key decode (only if notarize enabled) --------
      - name: Write ASC API key to disk
        if: matrix.os == 'macos-14' && env.SKIP_NOTARIZE != 'true'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      # -------- test + build --------
      # Rebuild native modules against Node ABI for vitest; Forge will
      # re-rebuild for Electron ABI during make via its auto-unpack-natives plugin.
      - name: Rebuild native modules for Node (test ABI)
        shell: bash
        run: npm rebuild better-sqlite3

      - name: Run tests
        run: npm test

      # After tests, rebuild native modules for Electron ABI.
      # The preceding `npm rebuild` switched to Node ABI for vitest;
      # afterCopy copies from node_modules so they must be Electron-compatible.
      - name: Rebuild native modules for Electron ABI
        shell: bash
        run: npx @electron/rebuild -f -w better-sqlite3

      # Build React pages into assets/. Forge extraResource references these.
      # Vite reads VITE_* vars from .env (not process.env), so we write one.
      - name: Write .env for Vite builds
        shell: bash
        run: |
          cat <<EOF > .env
          VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          VITE_CDN_DOMAIN=${{ secrets.VITE_CDN_DOMAIN }}
          VITE_SITE_URL=${{ secrets.VITE_SITE_URL }}
          VITE_DISCORD_CLIENT_ID=${{ secrets.VITE_DISCORD_CLIENT_ID }}
          VITE_PLAYER_SECRET=${{ secrets.VITE_PLAYER_SECRET }}
          EOF

      - name: Build player page
        run: npm run build:player

      - name: Build library page
        run: npm run build:library

      - name: Make macOS (universal, signed, notarize gated by SKIP_NOTARIZE)
        if: matrix.os == 'macos-14'
        env:
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-forge make --arch=universal --platform=darwin

      - name: Make Windows (x64 squirrel)
        if: matrix.os == 'windows-latest'
        run: npx electron-forge make --arch=x64 --platform=win32

      - name: Make Linux (x64 deb + rpm + AppImage)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-forge make --arch=x64 --platform=linux

      # -------- upload artifacts to draft release --------
      # Note on env: set GITHUB_TOKEN (not GH_TOKEN) so both gh CLI and
      # our generate-update-manifest.mjs find it. Do NOT override
      # GITHUB_REPOSITORY / GITHUB_REF_NAME at step level — they are
      # readonly defaults set by Actions and re-declaring them can mask
      # their value to child processes.
      - name: Upload macOS artifacts
        if: matrix.os == 'macos-14'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "--- Artifacts in out/make ---"
          find out/make -type f | sort
          echo "--- Uploading DMG + ZIP ---"
          find out/make -type f \( -name '*.dmg' -o -name '*.zip' \) \
            -exec gh release upload "$TAG" {} --clobber --repo "$GITHUB_REPOSITORY" \;
          echo "--- Generating and uploading latest-mac.yml ---"
          node scripts/generate-update-manifest.mjs darwin

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "--- Artifacts in out/make ---"
          find out/make -type f | sort
          # Rename Setup.exe to remove spaces — GitHub mangles spaces in asset names
          # which causes electron-updater URL mismatch (latest.yml vs actual asset).
          find out/make -name '*Setup.exe' | while read f; do
            newname="$(echo "$f" | sed 's/ /-/g')"
            if [ "$f" != "$newname" ]; then mv "$f" "$newname"; fi
          done
          # Generate blockmap for differential updates
          SETUP=$(find out/make -name '*Setup.exe' -type f | head -1)
          if [ -n "$SETUP" ]; then
            npx --yes app-builder-bin blockmap --input "$SETUP" --output "${SETUP}.blockmap" --compression gzip || echo "::warning::blockmap generation failed, full download will be used"
          fi
          echo "--- Uploading Setup.exe + blockmap + nupkg + RELEASES ---"
          find out/make -type f \( -name '*Setup.exe' -o -name '*.blockmap' -o -name '*.nupkg' -o -name 'RELEASES' \) \
            -exec gh release upload "$TAG" {} --clobber --repo "$GITHUB_REPOSITORY" \;
          echo "--- Generating and uploading latest.yml ---"
          node scripts/generate-update-manifest.mjs win32

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "--- Artifacts in out/make ---"
          find out/make -type f | sort
          echo "--- Uploading deb + rpm + AppImage ---"
          find out/make -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) \
            -exec gh release upload "$TAG" {} --clobber --repo "$GITHUB_REPOSITORY" \;

      # -------- cleanup (runs even on failure) --------
      # apple-actions/import-codesign-certs creates its own temp keychain and
      # cleans it up at job end; we only clean our ASC key file.
      - name: Cleanup ASC key file
        if: always() && matrix.os == 'macos-14'
        run: rm -f "$RUNNER_TEMP/AuthKey.p8" || true
