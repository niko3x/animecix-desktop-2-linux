name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write      # required: publisher-github needs releases:write

jobs:
  release:
    strategy:
      fail-fast: false       # one platform failing shouldn't kill the other
      matrix:
        include:
          - os: macos-14
            platform: darwin
          - os: windows-latest
            platform: win32
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Verify tag matches package.json version        # D-24
        shell: bash
        run: node scripts/verify-tag.mjs

      - name: Install dependencies
        run: npm ci

      # -------- macOS-only: cert import + ASC key decode --------
      - name: Import Developer ID certificate
        if: matrix.os == 'macos-14'
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
        run: |
          echo "::add-mask::$CERT_PASSWORD"
          echo "::add-mask::$CERT_P12_BASE64"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          # Decode without echoing
          printf '%s' "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "ci_password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci_password" "$KEYCHAIN_PATH"
          # -T flags prevent interactive prompt hang (Pitfall 2)
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k "ci_password" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      - name: Write ASC API key to disk                          # Pitfall 4
        if: matrix.os == 'macos-14'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      # -------- test + build + publish --------
      # Rebuild native modules against Node ABI for vitest; Forge will
      # re-rebuild for Electron ABI during publish via its auto-unpack-natives plugin.
      - name: Rebuild native modules for Node (test ABI)
        shell: bash
        run: npm rebuild better-sqlite3

      - name: Run tests
        run: npm test

      - name: Build universal macOS (if darwin)
        if: matrix.os == 'macos-14'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-forge publish --arch=universal --platform=darwin

      - name: Build Windows (if win32)
        if: matrix.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-forge publish --arch=x64 --platform=win32

      # -------- generate + upload electron-updater manifest --------
      - name: Generate and upload latest-mac.yml
        if: matrix.os == 'macos-14'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-update-manifest.mjs darwin

      - name: Generate and upload latest.yml
        if: matrix.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-update-manifest.mjs win32

      # -------- cleanup (runs even on failure) --------
      - name: Cleanup macOS keychain and key file
        if: always() && matrix.os == 'macos-14'
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true
          rm -f "$RUNNER_TEMP/AuthKey.p8" || true
          rm -f "$RUNNER_TEMP/cert.p12" || true
